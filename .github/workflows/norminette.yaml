name: Norminette

on: [push, pull_request]

jobs:
  norminette:
    runs-on: ubuntu-latest
    name: Norminette
    steps:
    - uses: actions/checkout@v7
    - uses: alexandregv/norminette-action@v3
  make:
    runs-on: ubuntu-22.04
    name: Make
    steps:
    - uses: actions/checkout@v7
    - run: make debug
